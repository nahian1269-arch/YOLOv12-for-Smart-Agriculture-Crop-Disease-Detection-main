<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            background: #eef4f0;
            color: #14201d;
            font-family: Arial, Helvetica, sans-serif;
        }
        .auth {
            width: min(430px, 100%);
            padding: 28px;
            border: 1px solid #d6e1dc;
            border-radius: 8px;
            background: white;
            box-shadow: 0 18px 48px rgba(22, 48, 39, 0.12);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .mark {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: #1f7a4d;
            color: white;
            font-weight: 800;
        }
        h1 { margin: 0; font-size: 25px; }
        p { color: #64716d; line-height: 1.5; }
        form { display: grid; gap: 14px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: #64716d;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 11px;
            border: 1px solid #c7d5cf;
            border-radius: 8px;
            font: inherit;
        }
        button {
            padding: 11px 14px;
            border: 0;
            border-radius: 8px;
            background: #1f7a4d;
            color: white;
            cursor: pointer;
            font-weight: 800;
        }
        .error {
            padding: 10px;
            border-radius: 8px;
            background: #ffe9e9;
            color: #b83b3b;
            font-weight: 700;
        }
        .links {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 18px;
            font-size: 14px;
        }
        a { color: #1f7a4d; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <main class="auth">
        <div class="brand">
            <div class="mark">NA</div>
            <div>
                <h1>{{ app_name }}</h1>
                <p style="margin: 3px 0 0;">Farmer account login</p>
            </div>
        </div>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div class="links">
            <a href="{{ url_for('signup') }}">Create account</a>
            <a href="{{ url_for('admin_dashboard') }}">Admin login</a>
        </div>
    </main>
</body>
</html>
